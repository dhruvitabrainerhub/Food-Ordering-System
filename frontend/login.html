<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodExpress</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body style="background:#f5f5f5">
<nav>
    <a href="/" class="logo">🍔 FoodExpress</a>
</nav>

<div class="form-container">
    <h2 id="form-title">Login</h2>
    <div id="alert"></div>

    <div id="login-form">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
        <p style="text-align:center;margin-top:16px">Don't have an account? <a href="#" onclick="showRegister()" style="color:#fc8019">Register</a></p>
    </div>

    <div id="register-form" style="display:none">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Create password">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="reg-phone" placeholder="Phone number">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea id="reg-address" placeholder="Delivery address"></textarea>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="register()">Register</button>
        <p style="text-align:center;margin-top:16px">Already have an account? <a href="#" onclick="showLogin()" style="color:#fc8019">Login</a></p>
    </div>
</div>

<script src="static/app.js"></script>
<script>
function showAlert(msg, type = "error") {
    document.getElementById("alert").innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

function showRegister() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("register-form").style.display = "block";
    document.getElementById("form-title").textContent = "Create Account";
}

function showLogin() {
    document.getElementById("register-form").style.display = "none";
    document.getElementById("login-form").style.display = "block";
    document.getElementById("form-title").textContent = "Login";
}

async function login() {
    try {
        const data = await apiFetch("/auth/login", {
            method: "POST",
            body: {
                email: document.getElementById("login-email").value,
                password: document.getElementById("login-password").value
            }
        });
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = data.user.is_admin ? "/admin" : "/";
    } catch(e) { showAlert(e.message); }
}

async function register() {
    try {
        const data = await apiFetch("/auth/register", {
            method: "POST",
            body: {
                name: document.getElementById("reg-name").value,
                email: document.getElementById("reg-email").value,
                password: document.getElementById("reg-password").value,
                phone: document.getElementById("reg-phone").value,
                address: document.getElementById("reg-address").value
            }
        });
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/";
    } catch(e) { showAlert(e.message); }
}

if (getUser()) window.location.href = "/";
</script>
</body>
</html>
