                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /         { try_files /index.html =404; }
    location = /login    { try_files /login.html =404; }
    location = /menu     { try_files /menu.html =404; }
    location = /cart     { try_files /cart.html =404; }
    location = /orders   { try_files /orders.html =404; }
    location = /admin    { try_files /admin.html =404; }
    location = /payment  { try_files /payment.html =404; }

    location /static/    { try_files $uri =404; }
}
