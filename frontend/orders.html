<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FoodExpress</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        .cancel-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .cancel-modal.open { display: flex; }
        .cancel-box {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .cancel-box .icon { font-size: 3rem; margin-bottom: 12px; }
        .cancel-box h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .cancel-box p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .cancel-box .actions { display: flex; gap: 12px; }
        .cancel-box .actions button { flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; }
        .btn-keep { background: #f0f0f0; color: #333; }
        .btn-confirm-cancel { background: #ff3860; color: white; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="logo">🍔 FoodExpress</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container" style="max-width:800px">
    <h2 style="margin:24px 0">My Orders</h2>
    <div id="alert"></div>
    <div id="orders-list"></div>
</div>

<!-- Cancel Confirmation Modal -->
<div class="cancel-modal" id="cancel-modal">
    <div class="cancel-box">
        <div class="icon">⚠️</div>
        <h3>Cancel Order?</h3>
        <p id="cancel-modal-msg">Are you sure you want to cancel this order?</p>
        <div class="actions">
            <button class="btn-keep" onclick="closeCancel()">Keep Order</button>
            <button class="btn-confirm-cancel" onclick="confirmCancel()">Yes, Cancel</button>
        </div>
    </div>
</div>

<script src="static/app.js"></script>
<script>
checkAuth();

let pendingCancelId = null;
const cancellableStatuses = ["pending", "confirmed", "preparing"];

async function loadOrders() {
    try {
        const orders = await apiFetch("/orders/my");
        const el = document.getElementById("orders-list");
        if (!orders.length) {
            el.innerHTML = `<div style="text-align:center;padding:60px;color:#999"><p style="font-size:1.2rem">No orders yet</p><a href="/" class="btn btn-primary" style="margin-top:20px;display:inline-block">Order Now</a></div>`;
            return;
        }
        el.innerHTML = orders.map(o => `
            <div style="background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <div>
                        <span style="font-weight:700;font-size:1.1rem">Order #${o.id}</span>
                        <span style="color:#666;font-size:0.85rem;margin-left:12px">${new Date(o.created_at).toLocaleString()}</span>
                    </div>
                    <span class="status-badge status-${o.status}">${o.status}</span>
                </div>
                <div style="color:#666;margin-bottom:12px">📍 ${o.address}</div>
                <div style="border-top:1px solid #f0f0f0;padding-top:12px;display:flex;justify-content:space-between;align-items:center">
                    <span style="color:#666">${o.items.length} item(s)</span>
                    <span style="font-weight:700;color:#fc8019;font-size:1.1rem">₹${o.total_amount}</span>
                </div>
                ${cancellableStatuses.includes(o.status) ? `
                <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0">
                    <button class="btn btn-danger" style="font-size:0.9rem;padding:8px 18px" onclick="openCancel(${o.id}, '${o.status}')">
                        ✕ Cancel Order
                    </button>
                    ${o.status !== 'pending' ? `<span style="color:#999;font-size:0.8rem;margin-left:10px">Order is ${o.status} — cancellation may apply charges</span>` : ''}
                </div>` : ''}
                ${o.status === 'delivered' ? `<div style="margin-top:12px;color:#48c774;font-size:0.9rem;font-weight:600">✓ Delivered successfully</div>` : ''}
                ${o.status === 'cancelled' ? `<div style="margin-top:12px;color:#ff3860;font-size:0.9rem;font-weight:600">✕ Order was cancelled</div>` : ''}
            </div>
        `).join("");
    } catch(e) {
        document.getElementById("alert").innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
}

function openCancel(id, status) {
    pendingCancelId = id;
    const msgs = {
        pending:   "Your order hasn't been confirmed yet. It will be cancelled immediately.",
        confirmed: "Your order is confirmed. Are you sure you want to cancel it?",
        preparing: "Your order is being prepared. Cancellation may not be possible."
    };
    document.getElementById("cancel-modal-msg").textContent = msgs[status] || "Are you sure?";
    document.getElementById("cancel-modal").classList.add("open");
}

function closeCancel() {
    pendingCancelId = null;
    document.getElementById("cancel-modal").classList.remove("open");
}

async function confirmCancel() {
    if (!pendingCancelId) return;
    try {
        await apiFetch(`/orders/${pendingCancelId}/cancel`, { method: "PUT" });
        closeCancel();
        document.getElementById("alert").innerHTML = `<div class="alert alert-success">Order #${pendingCancelId} cancelled successfully.</div>`;
        setTimeout(() => document.getElementById("alert").innerHTML = "", 3000);
        loadOrders();
    } catch(e) {
        closeCancel();
        document.getElementById("alert").innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
}

loadOrders();
</script>
</body>
</html>
