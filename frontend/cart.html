<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FoodExpress</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
<nav>
    <a href="/" class="logo">🍔 FoodExpress</a>
    <div class="nav-links"><a href="/">← Back</a></div>
</nav>

<div class="container" style="max-width:700px">
    <h2 style="margin:24px 0">Your Cart</h2>
    <div id="alert"></div>
    <div id="cart-content"></div>
</div>

<script src="static/app.js"></script>
<script>
checkAuth();

function renderCart() {
    const el = document.getElementById("cart-content");
    if (!cart.length) {
        el.innerHTML = `<div style="text-align:center;padding:60px"><p style="font-size:1.2rem;color:#999">Your cart is empty</p><a href="/" class="btn btn-primary" style="margin-top:20px;display:inline-block">Browse Restaurants</a></div>`;
        return;
    }
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    el.innerHTML = `
        <div style="background:white;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
            ${cart.map((item, i) => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:600">${item.name}</div>
                        <div style="color:#666;font-size:0.9rem">₹${item.price} each</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="qty-btn" onclick="changeQty(${i}, -1)">-</button>
                        <span style="font-weight:600">${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                        <span style="font-weight:700;color:#fc8019;min-width:60px;text-align:right">₹${(item.price * item.qty).toFixed(2)}</span>
                    </div>
                </div>
            `).join("")}
            <div style="border-top:2px solid #f0f0f0;margin-top:16px;padding-top:16px;display:flex;justify-content:space-between;font-size:1.2rem;font-weight:700">
                <span>Total</span><span style="color:#fc8019">₹${total.toFixed(2)}</span>
            </div>
        </div>

        <div style="background:white;border-radius:12px;padding:20px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
            <h3 style="margin-bottom:16px">Delivery Address</h3>
            <div class="form-group">
                <textarea id="delivery-address" placeholder="Enter full delivery address" rows="3">${getUser()?.address || ""}</textarea>
            </div>
            <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1.1rem" onclick="goToPayment()">
                Proceed to Payment →
            </button>
        </div>
    `;
}

function changeQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    saveCart();
    renderCart();
}

function goToPayment() {
    const address = document.getElementById("delivery-address").value.trim();
    if (!address) {
        document.getElementById("alert").innerHTML = '<div class="alert alert-error">Please enter delivery address</div>';
        return;
    }
    localStorage.setItem("pending_address", address);
    window.location.href = `/payment?address=${encodeURIComponent(address)}`;
}

renderCart();
</script>
</body>
</html>
